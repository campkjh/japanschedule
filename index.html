<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Japan Schedule - 일본 일정 관리를 위한 웹앱"
    />
    <title>Japan Schedule</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Japan Schedule</p>
        <h1>일본 여행 일정을 한눈에 정리하세요.</h1>
        <p class="lead">
          항공, 숙소, 도시별 이동과 오늘 해야 할 일을 담아둘 수 있는
          일정 앱의 시작 화면입니다.
        </p>
      </section>

      <section class="schedule-board" aria-label="일정 예시">
        <article>
          <span>Day 1</span>
          <h2>도쿄 도착</h2>
          <p>나리타 공항, 숙소 체크인, 신주쿠 저녁 산책</p>
        </article>
        <article>
          <span>Day 2</span>
          <h2>시부야와 하라주쿠</h2>
          <p>카페, 쇼핑, 요요기 공원, 저녁 예약</p>
        </article>
        <article>
          <span>Day 3</span>
          <h2>근교 이동</h2>
          <p>가마쿠라 또는 요코하마 당일치기 일정</p>
        </article>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
